app-id: io.github.denysfizer.OpenvpnGuiLinux
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: openvpn-gui-linux
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host:ro
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/openvpn-gui-linux/cargo
modules:
  - name: openvpn-gui-linux
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --locked
      - install -Dm755 target/release/openvpn-gui-linux
        /app/bin/openvpn-gui-linux
      - install -Dm644 packaging/openvpn-gui-linux.desktop
        /app/share/applications/io.github.denysfizer.OpenvpnGuiLinux.desktop
      - install -Dm644 assets/logo.png
        /app/share/icons/hicolor/256x256/apps/io.github.denysfizer.OpenvpnGuiLinux.png
    sources:
      - type: dir
        path: ../..

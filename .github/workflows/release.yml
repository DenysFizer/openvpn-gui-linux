name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

      - name: Build tarball + .deb + .rpm
        run: bash scripts/package.sh

      - name: Download AppImage tooling
        run: |
          mkdir -p tools
          curl -fsSL -o tools/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o tools/appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x tools/*.AppImage

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPDIR=build/AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp target/release/openvpn-gui-linux "$APPDIR/usr/bin/"
          cp packaging/openvpn-gui-linux.desktop "$APPDIR/usr/share/applications/"
          cp packaging/openvpn-gui-linux.desktop "$APPDIR/"
          cp assets/logo.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/openvpn-gui-linux.png"
          cp assets/logo.png "$APPDIR/openvpn-gui-linux.png"
          export APPIMAGE_EXTRACT_AND_RUN=1
          tools/linuxdeploy-x86_64.AppImage --appdir "$APPDIR"
          ARCH=x86_64 tools/appimagetool-x86_64.AppImage "$APPDIR" \
            "dist/openvpn-gui-linux-${VERSION}-x86_64.AppImage"

      - name: Generate SHA256SUMS
        working-directory: dist
        run: |
          sha256sum openvpn-gui-linux-* openvpn-gui-linux_* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/openvpn-gui-linux-*.tar.gz \
            dist/openvpn-gui-linux_*.deb \
            dist/openvpn-gui-linux-*.rpm \
            dist/openvpn-gui-linux-*.AppImage \
            dist/SHA256SUMS